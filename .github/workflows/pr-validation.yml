name: 🔍 Validation Pull Request - Manounou

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ main, develop ]

env:
  DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer

jobs:
  pr-validation:
    name: 🔍 Validation PR
    runs-on: macos-latest
    
    steps:
    - name: 📥 Checkout du code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: 🔧 Configuration Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
    
    - name: 📋 Informations PR
      run: |
        echo "🔀 PR #${{ github.event.number }}"
        echo "👤 Auteur: ${{ github.event.pull_request.user.login }}"
        echo "🌿 Branche source: ${{ github.event.pull_request.head.ref }}"
        echo "🎯 Branche cible: ${{ github.event.pull_request.base.ref }}"
        echo "📝 Titre: ${{ github.event.pull_request.title }}"
    
    - name: 🔍 Validation du titre PR
      run: |
        TITLE="${{ github.event.pull_request.title }}"
        echo "📝 Validation du titre: $TITLE"
        
        # Vérification du format conventionnel
        if [[ ! "$TITLE" =~ ^(feat|fix|docs|style|refactor|test|chore|perf|ci|build)(\(.+\))?: .+ ]]; then
          echo "❌ Le titre de la PR doit suivre le format conventionnel:"
          echo "   feat(scope): description"
          echo "   fix(scope): description"
          echo "   docs: description"
          echo "   etc."
          exit 1
        fi
        
        echo "✅ Format du titre valide"
    
    - name: 📊 Analyse des changements
      run: |
        echo "📊 Analyse des fichiers modifiés..."
        
        # Récupération des fichiers modifiés
        git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD > changed_files.txt
        
        echo "📁 Fichiers modifiés:"
        cat changed_files.txt
        
        # Statistiques
        SWIFT_FILES=$(grep "\.swift$" changed_files.txt | wc -l)
        CONFIG_FILES=$(grep -E "\.(plist|xcconfig|json)$" changed_files.txt | wc -l)
        DOC_FILES=$(grep -E "\.(md|txt)$" changed_files.txt | wc -l)
        
        echo "📈 Statistiques:"
        echo "  🔹 Fichiers Swift: $SWIFT_FILES"
        echo "  🔹 Fichiers de config: $CONFIG_FILES"
        echo "  🔹 Documentation: $DOC_FILES"
        
        # Vérification de la taille de la PR
        TOTAL_FILES=$(wc -l < changed_files.txt)
        if [ $TOTAL_FILES -gt 50 ]; then
          echo "⚠️  PR volumineuse ($TOTAL_FILES fichiers) - considérez la diviser"
        fi
    
    - name: 🔍 Validation des messages de commit
      run: |
        echo "🔍 Validation des messages de commit..."
        
        # Récupération des commits de la PR
        git log --pretty=format:"%s" origin/${{ github.event.pull_request.base.ref }}..HEAD > commit_messages.txt
        
        echo "📝 Messages de commit:"
        cat commit_messages.txt
        
        # Validation de chaque message
        while IFS= read -r message; do
          echo "🔍 Validation: $message"
          
          # Vérification du format conventionnel
          if [[ ! "$message" =~ ^(feat|fix|docs|style|refactor|test|chore|perf|ci|build)(\(.+\))?: .+ ]]; then
            echo "❌ Message non conforme: $message"
            echo "   Format attendu: type(scope): description"
            exit 1
          fi
          
          # Vérification de la longueur
          if [ ${#message} -gt 72 ]; then
            echo "⚠️  Message trop long (${#message} caractères): $message"
          fi
          
        done < commit_messages.txt
        
        echo "✅ Tous les messages de commit sont valides"
    
    - name: 🔒 Vérification de sécurité
      run: |
        echo "🔒 Vérification de sécurité..."
        
        # Recherche d'informations sensibles dans les fichiers modifiés
        if git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD | xargs grep -l -i "password\|secret\|key\|token\|api_key" 2>/dev/null; then
          echo "⚠️  Informations potentiellement sensibles détectées!"
          echo "🔍 Vérifiez que ces informations ne sont pas exposées:"
          git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD | xargs grep -n -i "password\|secret\|key\|token\|api_key" 2>/dev/null || true
        else
          echo "✅ Aucune information sensible détectée"
        fi
    
    - name: 🧹 Nettoyage cache Xcode
      run: |
        rm -rf ~/Library/Developer/Xcode/DerivedData
        rm -rf ~/Library/Caches/com.apple.dt.Xcode
    
    - name: 📦 Résolution des dépendances
      run: |
        xcodebuild -resolvePackageDependencies -project Manounou.xcodeproj
    
    - name: 🔨 Build de validation
      run: |
        echo "🔨 Build de validation pour PR..."
        chmod +x ./build_simulator_only.sh
        ./build_simulator_only.sh
    
    - name: 🧪 Tests de validation
      run: |
        echo "🧪 Exécution des tests pour PR..."
        chmod +x ./run_tests.sh
        ./run_tests.sh
    
    - name: 📊 Rapport de validation
      if: always()
      run: |
        echo "📊 Rapport de validation PR"
        echo "=========================="
        echo "🔀 PR: #${{ github.event.number }}"
        echo "👤 Auteur: ${{ github.event.pull_request.user.login }}"
        echo "🌿 Branche: ${{ github.event.pull_request.head.ref }}"
        echo "📅 Date: $(date)"
        echo ""
        
        if [ -f "build.log" ]; then
          echo "🔨 Build: $(tail -1 build.log | grep -q "BUILD SUCCEEDED" && echo "✅ Succès" || echo "❌ Échec")"
        fi
        
        if [ -f "tests.log" ]; then
          echo "🧪 Tests: $(tail -1 tests.log | grep -q "Test session results" && echo "✅ Exécutés" || echo "❌ Échec")"
        fi
    
    - name: 📤 Upload des logs PR
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: pr-validation-logs-${{ github.event.number }}
        path: |
          *.log
          changed_files.txt
          commit_messages.txt
        retention-days: 14

  code-review-assistant:
    name: 🤖 Assistant Code Review
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout du code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: 🔍 Analyse automatique
      run: |
        echo "🤖 Analyse automatique pour code review..."
        
        # Récupération des fichiers Swift modifiés
        git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD | grep "\.swift$" > swift_files.txt || true
        
        if [ -s swift_files.txt ]; then
          echo "📝 Fichiers Swift à reviewer:"
          cat swift_files.txt
          
          echo ""
          echo "🔍 Points d'attention automatiques:"
          
          # Recherche de patterns à reviewer
          while IFS= read -r file; do
            echo "📁 $file:"
            
            # Force unwrapping
            if git diff origin/${{ github.event.pull_request.base.ref }}...HEAD -- "$file" | grep "^+" | grep -q "!"; then
              echo "  ⚠️  Force unwrapping détecté - vérifiez la sécurité"
            fi
            
            # Print statements
            if git diff origin/${{ github.event.pull_request.base.ref }}...HEAD -- "$file" | grep "^+" | grep -q "print("; then
              echo "  ⚠️  Print statements ajoutés - à retirer en production"
            fi
            
            # TODO/FIXME
            if git diff origin/${{ github.event.pull_request.base.ref }}...HEAD -- "$file" | grep "^+" | grep -q -E "TODO|FIXME"; then
              echo "  📝 TODO/FIXME ajoutés - planifiez le suivi"
            fi
            
          done < swift_files.txt
        else
          echo "ℹ️  Aucun fichier Swift modifié"
        fi