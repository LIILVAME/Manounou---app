<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Visage Studio Ghibli - Garçon français -->
  <defs>
    <linearGradient id="skinGradientFrench" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F9E5D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8D0B8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hairGradientBlond" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8935F;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Cheveux blonds -->
  <ellipse cx="100" cy="70" rx="75" ry="60" fill="url(#hairGradientBlond)"/>
  <path d="M 40 80 Q 50 60, 60 70 Q 70 75, 80 80" stroke="#E8C4A8" stroke-width="2" fill="none"/>
  <path d="M 160 80 Q 150 60, 140 70 Q 130 75, 120 80" stroke="#E8C4A8" stroke-width="2" fill="none"/>
  
  <!-- Visage -->
  <ellipse cx="100" cy="110" rx="70" ry="80" fill="url(#skinGradientFrench)"/>
  
  <!-- Yeux bleus -->
  <ellipse cx="80" cy="100" rx="8" ry="12" fill="#4A90E2"/>
  <ellipse cx="120" cy="100" rx="8" ry="12" fill="#4A90E2"/>
  <ellipse cx="80" cy="100" rx="5" ry="8" fill="#1A1A1A"/>
  <ellipse cx="120" cy="100" rx="5" ry="8" fill="#1A1A1A"/>
  <ellipse cx="79" cy="99" rx="2" ry="3" fill="#FFFFFF"/>
  <ellipse cx="119" cy="99" rx="2" ry="3" fill="#FFFFFF"/>
  
  <!-- Sourcils -->
  <path d="M 65 85 Q 80 80, 95 85" stroke="#B8935F" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 105 85 Q 120 80, 135 85" stroke="#B8935F" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Nez -->
  <ellipse cx="100" cy="115" rx="4" ry="6" fill="#E8D0B8"/>
  
  <!-- Bouche souriante -->
  <path d="M 85 130 Q 100 140, 115 130" stroke="#8B4513" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Joues rosées -->
  <ellipse cx="60" cy="120" rx="12" ry="15" fill="#F8B4A0" opacity="0.5"/>
  <ellipse cx="140" cy="120" rx="12" ry="15" fill="#F8B4A0" opacity="0.5"/>
</svg>

