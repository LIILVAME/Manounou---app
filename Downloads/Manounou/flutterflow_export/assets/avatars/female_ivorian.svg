<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Visage Studio Ghibli - Fille ivoirienne -->
  <defs>
    <linearGradient id="skinGradientIvorianFemale" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8935F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hairGradientAfro" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3D2817;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2C1A0F;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Cheveux afro -->
  <ellipse cx="100" cy="60" rx="85" ry="70" fill="url(#hairGradientAfro)"/>
  <circle cx="55" cy="55" r="10" fill="url(#hairGradientAfro)"/>
  <circle cx="70" cy="50" r="9" fill="url(#hairGradientAfro)"/>
  <circle cx="130" cy="50" r="9" fill="url(#hairGradientAfro)"/>
  <circle cx="145" cy="55" r="10" fill="url(#hairGradientAfro)"/>
  <circle cx="85" cy="45" r="8" fill="url(#hairGradientAfro)"/>
  <circle cx="115" cy="45" r="8" fill="url(#hairGradientAfro)"/>
  <circle cx="100" cy="40" r="7" fill="url(#hairGradientAfro)"/>
  
  <!-- Visage -->
  <ellipse cx="100" cy="110" rx="65" ry="75" fill="url(#skinGradientIvorianFemale)"/>
  
  <!-- Yeux -->
  <ellipse cx="80" cy="100" rx="7" ry="10" fill="#1A1A1A"/>
  <ellipse cx="120" cy="100" rx="7" ry="10" fill="#1A1A1A"/>
  <ellipse cx="79" cy="99" rx="2" ry="3" fill="#FFFFFF"/>
  <ellipse cx="119" cy="99" rx="2" ry="3" fill="#FFFFFF"/>
  
  <!-- Sourcils -->
  <path d="M 70 88 Q 80 85, 90 88" stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 110 88 Q 120 85, 130 88" stroke="#3D2817" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Nez -->
  <ellipse cx="100" cy="115" rx="3" ry="5" fill="#B8935F"/>
  
  <!-- Bouche souriante -->
  <path d="M 85 130 Q 100 135, 115 130" stroke="#E85A7A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Joues -->
  <ellipse cx="60" cy="120" rx="10" ry="12" fill="#D4A574" opacity="0.3"/>
  <ellipse cx="140" cy="120" rx="10" ry="12" fill="#D4A574" opacity="0.3"/>
  
  <!-- Boucles d'oreilles (optionnel) -->
  <circle cx="55" cy="115" r="3" fill="#FFD700"/>
  <circle cx="145" cy="115" r="3" fill="#FFD700"/>
</svg>

