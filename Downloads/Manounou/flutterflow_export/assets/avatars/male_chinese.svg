<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Visage Studio Ghibli - Garçon chinois -->
  <defs>
    <linearGradient id="skinGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F4D4C1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8C4A8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hairGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2C1810;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A0F08;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Cheveux -->
  <ellipse cx="100" cy="70" rx="75" ry="60" fill="url(#hairGradient)"/>
  <path d="M 40 80 Q 50 60, 60 70 Q 70 75, 80 80 Q 90 85, 100 90" stroke="url(#hairGradient)" stroke-width="3" fill="none"/>
  <path d="M 160 80 Q 150 60, 140 70 Q 130 75, 120 80 Q 110 85, 100 90" stroke="url(#hairGradient)" stroke-width="3" fill="none"/>
  
  <!-- Visage -->
  <ellipse cx="100" cy="110" rx="70" ry="80" fill="url(#skinGradient)"/>
  
  <!-- Yeux -->
  <ellipse cx="80" cy="100" rx="8" ry="12" fill="#1A1A1A"/>
  <ellipse cx="120" cy="100" rx="8" ry="12" fill="#1A1A1A"/>
  <ellipse cx="78" cy="98" rx="3" ry="4" fill="#FFFFFF"/>
  <ellipse cx="118" cy="98" rx="3" ry="4" fill="#FFFFFF"/>
  
  <!-- Sourcils -->
  <path d="M 65 85 Q 80 80, 95 85" stroke="#2C1810" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 105 85 Q 120 80, 135 85" stroke="#2C1810" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Nez -->
  <ellipse cx="100" cy="115" rx="4" ry="6" fill="#E8C4A8"/>
  
  <!-- Bouche souriante -->
  <path d="M 85 130 Q 100 140, 115 130" stroke="#8B4513" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Joues rosées -->
  <ellipse cx="60" cy="120" rx="12" ry="15" fill="#F8B4A0" opacity="0.4"/>
  <ellipse cx="140" cy="120" rx="12" ry="15" fill="#F8B4A0" opacity="0.4"/>
</svg>

