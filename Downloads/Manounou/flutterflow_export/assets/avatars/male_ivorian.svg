<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Visage Studio Ghibli - Garçon ivoirien -->
  <defs>
    <linearGradient id="skinGradientIvorian" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8935F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hairGradientCurly" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3D2817;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2C1A0F;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Cheveux bouclés -->
  <ellipse cx="100" cy="65" rx="80" ry="65" fill="url(#hairGradientCurly)"/>
  <circle cx="55" cy="60" r="8" fill="url(#hairGradientCurly)"/>
  <circle cx="70" cy="55" r="7" fill="url(#hairGradientCurly)"/>
  <circle cx="130" cy="55" r="7" fill="url(#hairGradientCurly)"/>
  <circle cx="145" cy="60" r="8" fill="url(#hairGradientCurly)"/>
  <circle cx="85" cy="50" r="6" fill="url(#hairGradientCurly)"/>
  <circle cx="115" cy="50" r="6" fill="url(#hairGradientCurly)"/>
  
  <!-- Visage -->
  <ellipse cx="100" cy="110" rx="70" ry="80" fill="url(#skinGradientIvorian)"/>
  
  <!-- Yeux -->
  <ellipse cx="80" cy="100" rx="8" ry="12" fill="#1A1A1A"/>
  <ellipse cx="120" cy="100" rx="8" ry="12" fill="#1A1A1A"/>
  <ellipse cx="78" cy="98" rx="3" ry="4" fill="#FFFFFF"/>
  <ellipse cx="118" cy="98" rx="3" ry="4" fill="#FFFFFF"/>
  
  <!-- Sourcils -->
  <path d="M 65 85 Q 80 80, 95 85" stroke="#3D2817" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 105 85 Q 120 80, 135 85" stroke="#3D2817" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Nez -->
  <ellipse cx="100" cy="115" rx="4" ry="6" fill="#B8935F"/>
  
  <!-- Bouche souriante -->
  <path d="M 85 130 Q 100 140, 115 130" stroke="#8B4513" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Joues -->
  <ellipse cx="60" cy="120" rx="12" ry="15" fill="#D4A574" opacity="0.3"/>
  <ellipse cx="140" cy="120" rx="12" ry="15" fill="#D4A574" opacity="0.3"/>
</svg>

