name: manounou
description: Manounou - Application Familiale iOS & Android
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Supabase
  supabase_flutter: ^2.0.0
  
  # UI & Navigation
  cupertino_icons: ^1.0.6
  go_router: ^12.0.0
  
  # State Management
  provider: ^6.1.1
  
  # Utilities
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter
  
  # File handling
  file_picker: ^8.1.4  # Version plus récente avec meilleure gestion web
  image_picker: ^1.0.5
  cached_network_image: ^3.4.1
  url_launcher: ^6.2.5
  
  # PDF
  pdf: ^3.10.7
  printing: ^5.12.0
  
  # SVG
  flutter_svg: ^2.0.9
  
  # UI Animations
  shimmer: ^3.0.0
  flutter_slidable: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/avatars/

