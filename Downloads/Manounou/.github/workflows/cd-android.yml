name: 🚀 CD - Déploiement Android

on:
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (ex: 1.0.0)'
        required: true

jobs:
  build-and-deploy-android:
    name: 📱 Build & Deploy Android
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'
          channel: 'stable'

      - name: 🔧 Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 📦 Install dependencies
        working-directory: ./flutterflow_export
        run: flutter pub get

      - name: 🔨 Build APK
        working-directory: ./flutterflow_export
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: flutter build apk --release

      - name: 🔨 Build App Bundle
        working-directory: ./flutterflow_export
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: flutter build appbundle --release

      - name: 📝 Extract version
        id: version
        working-directory: ./flutterflow_export
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/\+.*//')
          BUILD=$(grep '^version:' pubspec.yaml | sed 's/.*+//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v3
        with:
          name: android-apk-${{ steps.version.outputs.version }}
          path: flutterflow_export/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: 📤 Upload AAB artifact
        uses: actions/upload-artifact@v3
        with:
          name: android-aab-${{ steps.version.outputs.version }}
          path: flutterflow_export/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: 📝 Release notes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "## 🚀 Manounou Android v${{ steps.version.outputs.version }}" >> release_notes.md
          echo "" >> release_notes.md
          echo "**Build:** ${{ steps.version.outputs.build }}" >> release_notes.md
          echo "**Date:** $(date +'%Y-%m-%d %H:%M:%S')" >> release_notes.md
          echo "" >> release_notes.md
          echo "### 📋 Changements" >> release_notes.md
          git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD^)..HEAD >> release_notes.md || echo "- Version initiale" >> release_notes.md

      - name: 🏷️ Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            flutterflow_export/build/app/outputs/flutter-apk/app-release.apk
            flutterflow_export/build/app/outputs/bundle/release/app-release.aab
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

