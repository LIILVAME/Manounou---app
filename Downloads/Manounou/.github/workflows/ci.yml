name: 🧪 CI - Tests & Analyse

on:
  push:
    branches: [ main, develop, 'feature/**', 'hotfix/**' ]
  pull_request:
    branches: [ main, develop ]

env:
  FLUTTER_VERSION: '3.35.7'
  WORKING_DIRECTORY: ./flutterflow_export

jobs:
  analyze:
    name: 📊 Analyse du Code
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: 📦 Install dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: flutter pub get

      - name: 🔍 Analyse statique
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: flutter analyze --no-fatal-infos

  test:
    name: 🧪 Tests Unitaires
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: 📦 Install dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: flutter pub get

      - name: 🧪 Run tests
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: flutter test --coverage

      - name: 📊 Upload coverage
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./flutterflow_export/coverage/lcov.info
          flags: unittests
          name: manounou-coverage
          fail_ci_if_error: false

  build-check:
    name: 🔨 Vérification Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [ios, android, web]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: 📦 Install dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: flutter pub get

      - name: 🔨 Build check ${{ matrix.platform }}
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          case "${{ matrix.platform }}" in
            ios)
              flutter build ios --no-codesign --release
              ;;
            android)
              flutter build apk --release
              ;;
            web)
              flutter build web --release
              ;;
          esac

  security-scan:
    name: 🔐 Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: 📦 Install dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: flutter pub get

      - name: 🔍 Check for outdated packages
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: flutter pub outdated || true

      - name: 🔐 Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  quality-gate:
    name: ✅ Quality Gate
    runs-on: ubuntu-latest
    needs: [analyze, test, build-check, security-scan]
    if: always()
    steps:
      - name: ✅ All checks passed
        run: |
          if [ "${{ needs.analyze.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.build-check.result }}" != "success" ]; then
            echo "❌ Quality gate failed"
            exit 1
          fi
          echo "✅ Quality gate passed"

