<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- App Icon - Optimized for mobile screens -->
  <defs>
    <!-- Gradient for modern look -->
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6C63FF;stop-opacity:1" />
    </linearGradient>
    
    <!-- Shadow filter -->
    <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="60" cy="60" r="55" fill="url(#iconGradient)" filter="url(#iconShadow)"/>
  <circle cx="60" cy="60" r="55" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.2"/>
  
  <!-- Main house icon - larger and more prominent -->
  <g transform="translate(60, 60)">
    <!-- House structure -->
    <path d="M-25 5 L0 -25 L25 5 L25 25 C25 28.3 22.3 31 19 31 L-19 31 C-22.3 31 -25 28.3 -25 25 L-25 5 Z" 
          fill="#FFFFFF" 
          stroke="#F1F5F9" 
          stroke-width="1"/>
    
    <!-- Heart in the house - prominent and clear -->
    <path d="M0 20 C-3.5 16.5 -10 12 -10 7 C-10 3.7 -6.9 1 -3.5 1 C-1.8 1 -0.5 1.8 0 3 C0.5 1.8 1.8 1 3.5 1 C6.9 1 10 3.7 10 7 C10 12 3.5 16.5 0 20 Z" 
          fill="#6C63FF"/>
    
    <!-- Roof details for better definition -->
    <path d="M-25 5 L0 -25 L25 5" 
          fill="none" 
          stroke="#E2E8F0" 
          stroke-width="1.5" 
          stroke-linecap="round"/>
  </g>
  
  <!-- Decorative elements for brand recognition -->
  <circle cx="35" cy="35" r="3" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="85" cy="35" r="3" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="35" cy="85" r="2" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="85" cy="85" r="2" fill="#FFFFFF" opacity="0.4"/>
  
  <!-- Subtle inner glow for premium feel -->
  <circle cx="60" cy="60" r="50" fill="none" stroke="url(#iconGradient)" stroke-width="1" opacity="0.3"/>
</svg>