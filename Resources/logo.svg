<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Logo Icon - Optimized for mobile -->
  <g id="logo-icon">
    <!-- Background circle with stronger contrast -->
    <circle cx="30" cy="30" r="26" fill="#6C63FF" opacity="0.15"/>
    <circle cx="30" cy="30" r="24" fill="none" stroke="#6C63FF" stroke-width="1" opacity="0.2"/>
    
    <!-- Main icon - simplified house with heart -->
    <path d="M14 36 L30 18 L46 36 L46 46 C46 47.7 44.7 49 43 49 L17 49 C15.3 49 14 47.7 14 46 L14 36 Z" fill="#6C63FF" stroke="#4F46E5" stroke-width="0.5"/>
    
    <!-- Heart in the house - larger and more visible -->
    <path d="M30 42 C28.2 40.2 24 37.5 24 34 C24 31.8 25.8 30 28 30 C28.9 30 29.7 30.4 30 31 C30.3 30.4 31.1 30 32 30 C34.2 30 36 31.8 36 34 C36 37.5 31.8 40.2 30 42 Z" fill="white" stroke="#F8FAFC" stroke-width="0.5"/>
    
    <!-- Simplified decorative elements -->
    <circle cx="19" cy="24" r="1.5" fill="#6C63FF" opacity="0.6"/>
    <circle cx="41" cy="24" r="1.5" fill="#6C63FF" opacity="0.6"/>
  </g>
  
  <!-- Logo Text - Optimized for mobile readability -->
  <g id="logo-text">
    <!-- Main title with better contrast -->
    <text x="70" y="28" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="26" font-weight="800" fill="#1F2937" letter-spacing="-0.5px">Manounou</text>
    
    <!-- Subtitle with improved visibility -->
    <text x="70" y="44" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="500" fill="#6C63FF" opacity="0.9">Simplifiez la garde</text>
  </g>
  
  <!-- Mobile optimization: Add subtle shadow for depth -->
  <defs>
    <filter id="subtle-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- Apply shadow to icon for better mobile visibility -->
  <style>
    #logo-icon { filter: url(#subtle-shadow); }
    
    /* Mobile-specific optimizations */
    @media (max-width: 768px) {
      #logo-text text:first-child { font-size: 24px; }
      #logo-text text:last-child { font-size: 10px; }
    }
  </style>
</svg>