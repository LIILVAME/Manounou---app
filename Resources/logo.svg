    <!-- Heart in the house -->
    <path d="M30 40 C28.5 38.5 25 36 25 33 C25 31.3 26.3 30 28 30 C28.8 30 29.5 30.3 30 30.8 C30.5 30.3 31.2 30 32 30 C33.7 30 35 31.3 35 33 C35 36 31.5 38.5 30 40 Z" fill="white"/>
    
